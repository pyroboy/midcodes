name = "dorm"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# Do not set NODE_ENV via Wrangler vars — Cloudflare Pages uses these during build,
# and setting NODE_ENV=production makes package managers skip devDependencies.

# Cron trigger — daily at midnight UTC (8:00 AM PHT)
# Runs overdue detection, penalty calculation, and payment reminders.
# NOTE: [triggers] not supported in Pages projects — use CF Dashboard instead.
# [triggers]
# crons = ["0 0 * * *"]
